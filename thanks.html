<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Дякуємо! - KyivMetroGO</title>
  
  <style>
    /* Дефолтна тема — ТЕМНА (змінні безпосередньо у :root) */
    :root {
      --line-red: #c8523a;
      --line-blue: #5b9bd5;
      --line-green: #5aaa6a;
      --text: #ffffff;
      --text-muted: #ababab;
      --bg: #000000;
      --bg-card: #2c2c2e;
      --btn-bg: #1c1c1e;
    }

    /* СВІТЛА ТЕМА вмикається, якщо стоїть атрибут data-theme="light" 
       АБО якщо в системі світла тема (і атрибут не заданий) */
    [data-theme="light"] {
      --text: #000000;
      --text-muted: #8e8e93;
      --bg: #e5e5ea;
      --bg-card: #ffffff;
      --btn-bg: #ffffff;
    }
    
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --text: #000000;
        --text-muted: #8e8e93;
        --bg: #e5e5ea;
        --bg-card: #ffffff;
        --btn-bg: #ffffff;
      }
    }

    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center;
    }
    .salute-container {
      width: 160px; height: 160px; margin-bottom: 20px;
    }
    h1 {
      font-size: 24px; font-weight: 600; margin: 0 0 10px 0; font-variant: small-caps; letter-spacing: 0.04em;
    }
    p {
      font-size: 15px; color: var(--text-muted); max-width: 340px; margin: 0 0 40px 0; line-height: 1.45;
    }
    strong {
      color: var(--text);
      font-weight: 600;
    }
    .back-btn {
      text-decoration: none; font-size: 16px; font-weight: 600;
      color: var(--text); background: var(--btn-bg);
      padding: 14px 28px; border-radius: 12px; transition: opacity 0.2s;
    }
    .back-btn:active { opacity: 0.7; }
  </style>

  <script>
    // 1. СИНХРОНІЗАЦІЯ ТЕМИ З ДОДАТКОМ (миттєва, до рендеру)
    try {
      const savedTheme = localStorage.getItem('metro_theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
    } catch (e) { }
  </script>
</head>

  <h1 id="thanksTitle">Дякуємо за підтримку!</h1>
  <p id="thanksText">Вже задонатили на Сили оборони, і хочете допомогти KyivMetroGO?<br><br>Щоб опублікувати додаток в App Store, треба сплатити ліцензію Apple Developer, яка коштує <strong>$99 на рік</strong>.</p>
  
  <a href="index.html" class="back-btn">Повернутись до карти</a>

  <script>
    // 2. ДИНАМІЧНИЙ ТЕКСТ В ЗАЛЕЖНОСТІ ВІД ПРИЧИНИ ПЕРЕХОДУ
    const params = new URLSearchParams(window.location.search);
    if (params.get('type') === 'beta') {
      document.getElementById('thanksTitle').innerText = 'Дякуємо! Напишемо.';
      document.getElementById('thanksText').innerHTML = 'Електронну адресу збережено.<br><br>За правилами Google Play, перед публікацією ми маємо провести закрите тестування. Для нього потрібно <strong>20 тестувальників</strong>, які користуватимуться додатком <strong>14 днів поспіль</strong>. Ми надішлемо вам запрошення, щойно назбираємо доста охочих!';
    }

    // 3. АНІМАЦІЯ САЛЮТУ (Без хардкоду кольорів - читаємо прямо з CSS)
    const rs = getComputedStyle(document.documentElement);
    
    // Функція-помічник для витягування кольорів
    const getColor = (prop, fallback) => {
      const val = rs.getPropertyValue(prop).trim();
      return val ? val : fallback;
    };

    const THEME_COLORS = { 
      red:   getColor('--line-red', '#c8523a'), 
      blue:  getColor('--line-blue', '#5b9bd5'), 
      green: getColor('--line-green', '#5aaa6a'), 
      base:  getColor('--bg-card', '#2c2c2e')
    };

    const hexToRgb = hex => { const n = parseInt(hex.replace('#',''), 16); return [(n>>16)&255, (n>>8)&255, n&255]; };
    const lerp = (a, b, t) => Math.round(a + (b - a) * t);
    const mixColors = (c, b, t) => { const [r1,g1,b1]=hexToRgb(c); const [r2,g2,b2]=hexToRgb(b); return `rgb(${lerp(r2,r1,t)},${lerp(g2,g1,t)},${lerp(b2,b1,t)})`; };

    const svg = document.getElementById('saluteSvg');
    const petalsUnsorted = Array.from(svg.querySelectorAll('.st4'));
    const center = svg.querySelector('.eggCenter');
    const cb = center.getBoundingClientRect();
    const cx = cb.left + cb.width/2, cy = cb.top + cb.height/2;

    const petals = petalsUnsorted.map(p => {
      const b = p.getBoundingClientRect();
      const a = Math.atan2(b.top+b.height/2 - cy, b.left+b.width/2 - cx) * 180 / Math.PI;
      return { el: p, a: (a+90+360)%360 };
    }).sort((a,b) => a.a - b.a).map(p => p.el);

    petals.forEach(p => { p.style.fill = THEME_COLORS.base; p.style.transition = "fill 0.25s ease"; });

    const schemes = [
      { c: THEME_COLORS.red, p: [THEME_COLORS.blue, THEME_COLORS.green] },
      { c: THEME_COLORS.blue, p: [THEME_COLORS.red, THEME_COLORS.green] },
      { c: THEME_COLORS.green, p: [THEME_COLORS.red, THEME_COLORS.blue] }
    ];
    const s = schemes[Math.floor(Math.random() * schemes.length)];

    const runPetals = () => {
      const i = Math.floor(Math.random() * petals.length);
      petals[i].style.fill = mixColors(s.p[i%2], THEME_COLORS.base, 0.85);
      setTimeout(() => { petals[i].style.fill = THEME_COLORS.base; }, 400);
      setTimeout(runPetals, 150 + Math.random() * 200);
    };
    const runCenter = () => {
      const ph = (Date.now()/1000)%1.2;
      center.style.fill = mixColors(s.c, THEME_COLORS.base, 0.35 + Math.abs(Math.sin(ph*Math.PI))*0.65);
      requestAnimationFrame(runCenter);
    };

    runPetals(); runCenter();
  </script>
