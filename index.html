  <!-- Меню три крапки -->
  <button id="menuBtn" class="theme-btn-top menu-btn" aria-label="Меню">⋮</button>
  <div id="dropMenu" class="drop-menu" hidden>
    <button class="drop-item drop-item-icon" id="themeToggleItem" aria-label="Перемкнути тему">
      <span id="themeIcon">🌙</span>
    </button>
    <button class="drop-item drop-item-icon" id="feedbackItem" aria-label="Запропонувати зміни">
      <span>✏️</span>
    </button>
    <button class="drop-item drop-item-icon" id="aboutItem" aria-label="Про додаток">
      <span>ⓘ</span>
    </button>
  </div>

    <button id="favListBtn" class="ui-btn" aria-label="Обрані станції"><svg width="22" height="20" viewBox="0 0 24 22" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>

  </div>

    <div class="sheet-handle-bar">
      <div class="sheet-handle"></div>
      <span class="sheet-sheet-title">Обрані станції</span>
